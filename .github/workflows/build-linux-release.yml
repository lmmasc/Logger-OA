name: Build Linux Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag de release a compilar y adjuntar
        required: true
        type: string
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ github.event.inputs.release_tag }}"
            case "$RAW_TAG" in
              v*) RELEASE_TAG="$RAW_TAG" ;;
              *) RELEASE_TAG="v$RAW_TAG" ;;
            esac
            echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
            echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout requested tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags origin
          git checkout "refs/tags/${RELEASE_TAG}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            libxkbcommon0 \
            libfontconfig1 \
            libxcb1 \
            libx11-xcb1

      - name: Create virtual environment
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements-dev-modern.txt

      - name: Build Linux executable
        run: |
          chmod +x scripts/build-linux.sh
          ./scripts/build-linux.sh

      - name: Package Linux executable
        run: |
          cd dist
          chmod +x LoggerOA
          tar -czf LoggerOA-${RELEASE_TAG}-linux-x64.tar.gz LoggerOA

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoggerOA-${{ steps.resolve_tag.outputs.release_tag }}-linux-x64
          path: dist/LoggerOA-${{ steps.resolve_tag.outputs.release_tag }}-linux-x64.tar.gz

      - name: Attach asset to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.release_tag }}
          files: dist/LoggerOA-${{ steps.resolve_tag.outputs.release_tag }}-linux-x64.tar.gz
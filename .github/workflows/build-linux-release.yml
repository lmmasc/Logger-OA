name: Build Linux Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag de release a compilar y adjuntar
        required: true
        type: string
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.release_tag) || github.ref }}

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.release_tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            libxkbcommon0 \
            libfontconfig1 \
            libxcb1 \
            libx11-xcb1

      - name: Create virtual environment
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements-dev-modern.txt

      - name: Build Linux executable
        run: |
          chmod +x scripts/build-linux.sh
          ./scripts/build-linux.sh

      - name: Package Linux executable
        run: |
          cd dist
          tar -czf LoggerOA-${RELEASE_TAG}-linux-x64.tar.gz LoggerOA

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoggerOA-${{ env.RELEASE_TAG }}-linux-x64
          path: dist/LoggerOA-${{ env.RELEASE_TAG }}-linux-x64.tar.gz

      - name: Attach asset to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/LoggerOA-${{ env.RELEASE_TAG }}-linux-x64.tar.gz
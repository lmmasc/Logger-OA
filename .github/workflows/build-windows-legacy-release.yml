name: Build Windows Legacy Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag de release a compilar y adjuntar
        required: true
        type: string
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows-legacy:
    runs-on: windows-2022
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ github.event.inputs.release_tag }}"
            case "$RAW_TAG" in
              v*) RELEASE_TAG="$RAW_TAG" ;;
              *) RELEASE_TAG="v$RAW_TAG" ;;
            esac
            echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
            echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout requested tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --tags origin
          git checkout "refs/tags/${RELEASE_TAG}"

      - name: Set up Python 3.8 x86
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          architecture: "x86"

      - name: Create legacy virtual environment
        shell: cmd
        run: scripts\setup-windows-legacy.bat python

      - name: Build Windows legacy executable
        shell: cmd
        run: scripts\build-windows-legacy.bat

      - name: Rename Windows legacy artifact
        shell: pwsh
        run: |
          Copy-Item dist\LoggerOA-win7-x86.exe dist\LoggerOA-${env:RELEASE_TAG}-windows-win7-x86.exe -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoggerOA-${{ steps.resolve_tag.outputs.release_tag }}-windows-win7-x86
          path: dist/LoggerOA-${{ steps.resolve_tag.outputs.release_tag }}-windows-win7-x86.exe

      - name: Attach asset to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.release_tag }}
          files: dist/LoggerOA-${{ steps.resolve_tag.outputs.release_tag }}-windows-win7-x86.exe
name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag de release a compilar y adjuntar
        required: true
        type: string
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ github.event.inputs.release_tag }}"
            case "$RAW_TAG" in
              v*) RELEASE_TAG="$RAW_TAG" ;;
              *) RELEASE_TAG="v$RAW_TAG" ;;
            esac
            echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
            echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout requested tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --tags origin
          git checkout "refs/tags/${RELEASE_TAG}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Create modern virtual environment
        shell: cmd
        run: scripts\setup-windows-modern.bat python

      - name: Build Windows executable
        shell: cmd
        run: scripts\build-windows.bat

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $packageDir = Join-Path $env:RUNNER_TEMP 'LoggerOA-windows-x64'
          Remove-Item $packageDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item dist\LoggerOA.exe (Join-Path $packageDir 'LoggerOA.exe') -Force
          Compress-Archive -Path (Join-Path $packageDir 'LoggerOA.exe') -DestinationPath dist\LoggerOA-${env:RELEASE_TAG}-windows-x64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoggerOA-${{ steps.resolve_tag.outputs.release_tag }}-windows-x64
          path: dist/LoggerOA-${{ steps.resolve_tag.outputs.release_tag }}-windows-x64.zip

      - name: Attach asset to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.release_tag }}
          files: dist/LoggerOA-${{ steps.resolve_tag.outputs.release_tag }}-windows-x64.zip